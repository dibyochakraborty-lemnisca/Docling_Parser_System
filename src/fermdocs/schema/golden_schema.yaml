version: "2.0"
columns:
  - name: experiment_id
    description: Unique identifier for the fermentation experiment.
    data_type: text
    canonical_unit: null
    synonyms: [batch_id, run_id, exp_id, experiment, run]
    examples:
      - {raw_header: "Experiment ID"}
      - {raw_header: "Batch"}
      - {raw_header: "Run #"}

  - name: strain_id
    description: Strain identifier for the producing organism.
    data_type: text
    canonical_unit: null
    synonyms: [strain, strain_name, organism_id]
    examples:
      - {raw_header: "Strain"}
      - {raw_header: "Strain ID"}

  - name: organism
    description: Organism scientific or common name.
    data_type: text
    canonical_unit: null
    synonyms: [species, microbe, host, host_organism]
    examples:
      - {raw_header: "Organism"}
      - {raw_header: "Species"}

  - name: product
    description: Target metabolite, protein, or compound.
    data_type: text
    canonical_unit: null
    synonyms: [target, metabolite, compound, product_of_interest]
    examples:
      - {raw_header: "Product"}
      - {raw_header: "Target compound"}

  - name: biomass_g_l
    description: Biomass concentration (X).
    data_type: float
    canonical_unit: g/L
    nominal: 0.5
    std_dev: 0.05
    synonyms: [biomass, X, cell_concentration, cell_density, DCW, dry_cell_weight]
    examples:
      - {raw_header: "Biomass (X)"}
      - {raw_header: "X [g/L]"}
      - {raw_header: "DCW (g/L)"}

  - name: mu_x_max_per_h
    description: Maximum specific growth rate.
    data_type: float
    canonical_unit: h^-1
    nominal: 0.41
    std_dev: 0.025
    synonyms: [mu_x, mu_x_max, mu_max, max_specific_growth_rate, mumax]
    examples:
      - {raw_header: "mu_x (max)"}
      - {raw_header: "mu_max [h^-1]"}
      - {raw_header: "μ_x max"}

  - name: mu_p_max_per_h
    description: Maximum specific product formation rate.
    data_type: float
    canonical_unit: h^-1
    nominal: 0.041
    std_dev: 0.0025
    synonyms: [mu_p, mu_p_max, q_p_max, max_specific_product_rate]
    examples:
      - {raw_header: "mu_p (max)"}
      - {raw_header: "μ_p max"}
      - {raw_header: "q_P max [h^-1]"}

  - name: substrate_g_l
    description: Substrate concentration (S).
    data_type: float
    canonical_unit: g/L
    nominal: 1.0
    std_dev: 0.1
    synonyms: [substrate, S, sugar, carbon_source, glucose]
    examples:
      - {raw_header: "Substrate (S)"}
      - {raw_header: "S [g/L]"}
      - {raw_header: "Glucose (g/L)"}

  - name: dissolved_o2_mg_l
    description: Dissolved oxygen concentration.
    data_type: float
    canonical_unit: mg/L
    nominal: 15.0
    std_dev: 0.5
    synonyms: [DO, dissolved_oxygen, dO2, DO_mg_l]
    examples:
      - {raw_header: "Dissolved O2"}
      - {raw_header: "DO (mg/L)"}
      - {raw_header: "dO2 [mg L^-1]"}

  - name: volume_l
    description: Bioreactor working volume.
    data_type: float
    canonical_unit: L
    nominal: 58000.0
    std_dev: 500.0
    synonyms: [volume, working_volume, V, V_w]
    examples:
      - {raw_header: "Volume"}
      - {raw_header: "V (L)"}
      - {raw_header: "Working Volume"}

  - name: weight_kg
    description: Bioreactor broth weight.
    data_type: float
    canonical_unit: kg
    nominal: 62000.0
    std_dev: 500.0
    synonyms: [weight, broth_weight, mass]
    examples:
      - {raw_header: "Weight"}
      - {raw_header: "Mass (kg)"}
      - {raw_header: "Broth weight [kg]"}

  - name: ph
    description: Broth pH.
    data_type: float
    canonical_unit: pH
    nominal: 6.5
    std_dev: 0.1
    synonyms: [pH, pH_setpoint, pH_sp, pH_target]
    examples:
      - {raw_header: "pH"}
      - {raw_header: "pH setpoint"}

  - name: temperature_k
    description: Cultivation temperature.
    data_type: float
    canonical_unit: K
    nominal: 297.0
    std_dev: 0.5
    synonyms: [temp, temperature, T, cultivation_temp]
    examples:
      - {raw_header: "Temperature"}
      - {raw_header: "T (K)"}
      - {raw_header: "Temp [°C]"}

  - name: paa_mg_l
    description: Phenylacetic acid concentration.
    data_type: float
    canonical_unit: mg/L
    nominal: 1400.0
    std_dev: 50.0
    synonyms: [PAA, phenylacetic_acid, phenylacetate]
    examples:
      - {raw_header: "PAA"}
      - {raw_header: "PAA (mg/L)"}
      - {raw_header: "Phenylacetic acid [mg L^-1]"}

  - name: nh3_mg_l
    description: Ammonia concentration in broth.
    data_type: float
    canonical_unit: mg/L
    nominal: 1700.0
    std_dev: 50.0
    synonyms: [NH3, ammonia, NH3_conc]
    examples:
      - {raw_header: "NH3"}
      - {raw_header: "NH3 (mg/L)"}
      - {raw_header: "Ammonia [mg L^-1]"}

  - name: alpha_kla
    description: Oxygen mass-transfer coefficient scaling factor.
    data_type: float
    canonical_unit: null
    nominal: 85.0
    std_dev: 10.0
    synonyms: [alpha_kla, alphaKLa, alpha_kLa, kla_alpha]
    examples:
      - {raw_header: "alpha_kla"}
      - {raw_header: "α·kLa"}
      - {raw_header: "alpha kLa"}

  # ---------------------------------------------------------------------------
  # Universal aerobic-fermentation columns (added in Wave 1b — generalization).
  # These are function-based and apply across organisms (yeast, E. coli,
  # Penicillium, mammalian cell culture). Process-specific feeds (PAA, IPTG,
  # antifoam) belong in process_priors when that lands, not here.
  #
  # nominal/std_dev intentionally left null: ranges for these signals are
  # heavily process-dependent (OUR for E. coli ≠ OUR for Penicillium) and
  # range_violation against schema specs would produce noise. Process_priors
  # supplies real bounds when registered processes declare them.
  # ---------------------------------------------------------------------------

  - name: our_mmol_per_l_per_h
    description: Oxygen Uptake Rate. Universal aerobic metabolic indicator.
    data_type: float
    canonical_unit: mmol/L/h
    nominal: null
    std_dev: null
    synonyms: [OUR, oxygen_uptake_rate, qO2, q_O2, OUR_mmol]
    examples:
      - {raw_header: "OUR"}
      - {raw_header: "OUR (mmol/L/h)"}
      - {raw_header: "Oxygen Uptake Rate"}

  - name: cer_mmol_per_l_per_h
    description: Carbon Evolution Rate (CO2 production). Pairs with OUR for RQ.
    data_type: float
    canonical_unit: mmol/L/h
    nominal: null
    std_dev: null
    synonyms: [CER, carbon_evolution_rate, qCO2, q_CO2, CO2_evolution]
    examples:
      - {raw_header: "CER"}
      - {raw_header: "CER (mmol/L/h)"}
      - {raw_header: "Carbon Evolution Rate"}

  - name: rq_dimensionless
    description: Respiratory Quotient (CER / OUR). Indicates metabolic regime.
    data_type: float
    canonical_unit: "1"
    nominal: null
    std_dev: null
    synonyms: [RQ, respiratory_quotient, RQ_value]
    examples:
      - {raw_header: "RQ"}
      - {raw_header: "Respiratory Quotient"}

  - name: viscosity_cp
    description: Broth viscosity. Critical for mycelial / non-Newtonian cultures.
    data_type: float
    canonical_unit: cP
    nominal: null
    std_dev: null
    synonyms: [viscosity, mu, broth_viscosity, apparent_viscosity]
    examples:
      - {raw_header: "Viscosity"}
      - {raw_header: "Viscosity (cP)"}
      - {raw_header: "Apparent viscosity [cP]"}

  - name: agitation_rpm
    description: Impeller agitation speed.
    data_type: float
    canonical_unit: rpm
    nominal: null
    std_dev: null
    synonyms: [RPM, rpm, agitation, impeller_speed, stirrer_rpm]
    examples:
      - {raw_header: "RPM"}
      - {raw_header: "Agitation (rpm)"}
      - {raw_header: "Stirrer Speed"}

  - name: pressure_bar
    description: Headspace pressure in the bioreactor.
    data_type: float
    canonical_unit: bar
    nominal: null
    std_dev: null
    synonyms: [pressure, head_pressure, headspace_pressure, P_head]
    examples:
      - {raw_header: "Pressure"}
      - {raw_header: "Pressure (bar)"}
      - {raw_header: "Head Pressure"}

  - name: gas_flow_l_per_min
    description: Aeration / sparge gas flow rate. Universal across aerobic processes.
    data_type: float
    canonical_unit: L/min
    nominal: null
    std_dev: null
    synonyms: [gas_flow, aeration_rate, Fg, sparge_rate, air_flow, vvm_flow]
    examples:
      - {raw_header: "Fg"}
      - {raw_header: "Aeration"}
      - {raw_header: "Air flow (L/min)"}

  - name: feed_rate_l_per_h
    description: Substrate feed rate (generic). Process-specific feed identities (PAA, IPTG, antifoam) belong in process_priors when that lands.
    data_type: float
    canonical_unit: L/h
    nominal: null
    std_dev: null
    synonyms: [feed_rate, F_s, substrate_feed_rate, glucose_feed_rate, carbon_feed]
    examples:
      - {raw_header: "Fs"}
      - {raw_header: "Feed rate"}
      - {raw_header: "Substrate Feed (L/h)"}

  # ---------------------------------------------------------------------------
  # Tier A organism vocabulary (Penicillium, S. cerevisiae, E. coli).
  #
  # Variables here are well-established across the three covered organisms.
  # nominal/std_dev intentionally left null — organism-specific normal ranges
  # come from process_priors (deferred), not from a single shared schema number.
  # range_violation against null specs is a no-op, which is the correct
  # behavior for "schema knows the variable but priors aren't loaded yet."
  # ---------------------------------------------------------------------------

  # Shared microbial process measurements
  - name: od600_au
    description: Optical density at 600 nm. Universal proxy for biomass; converts to g/L only with strain-specific calibration.
    data_type: float
    canonical_unit: au
    nominal: null
    std_dev: null
    synonyms: [OD600, OD_600, OD, optical_density, OD600nm]
    examples:
      - {raw_header: "OD600"}
      - {raw_header: "OD (600 nm)"}
      - {raw_header: "Optical Density"}

  - name: do_pct_saturation
    description: Dissolved oxygen as percent of air saturation. Distinct from dissolved_o2_mg_l (absolute concentration); industrial probes typically report this.
    data_type: float
    canonical_unit: "%"
    nominal: null
    std_dev: null
    synonyms: [pO2, pO2_pct, DO_pct, DO_percent, dissolved_oxygen_pct]
    examples:
      - {raw_header: "pO2"}
      - {raw_header: "DO (%)"}
      - {raw_header: "DO % saturation"}

  - name: viability_pct
    description: Viable cell fraction as percent. Drops in late phase indicate cell death; pigment loss in carotenoid yeast manifests here too.
    data_type: float
    canonical_unit: "%"
    nominal: null
    std_dev: null
    synonyms: [viability, viable_pct, viable_fraction, cell_viability]
    examples:
      - {raw_header: "Viability"}
      - {raw_header: "Viable %"}
      - {raw_header: "Cell viability (%)"}

  # Yeast-specific
  - name: ethanol_g_l
    description: Ethanol concentration. Crabtree-positive yeast overflow metabolism marker; the primary diagnostic signal for S. cerevisiae overfeeding.
    data_type: float
    canonical_unit: g/L
    nominal: null
    std_dev: null
    synonyms: [ethanol, EtOH, ethanol_conc]
    examples:
      - {raw_header: "Ethanol"}
      - {raw_header: "EtOH (g/L)"}
      - {raw_header: "Ethanol [g L^-1]"}

  - name: glycerol_g_l
    description: Glycerol concentration. Common alternative carbon source for yeast (especially Pichia) and a byproduct/intermediate in some processes.
    data_type: float
    canonical_unit: g/L
    nominal: null
    std_dev: null
    synonyms: [glycerol, Gly, glycerol_conc]
    examples:
      - {raw_header: "Glycerol"}
      - {raw_header: "Glycerol (g/L)"}

  - name: wcw_g_l
    description: Wet cell weight. Distinct from biomass_g_l (dry); WCW ≈ 4-5x DCW for yeast and bacteria. Industrial reports often use this.
    data_type: float
    canonical_unit: g/L
    nominal: null
    std_dev: null
    synonyms: [WCW, wet_cell_weight, wet_weight, wet_biomass]
    examples:
      - {raw_header: "WCW"}
      - {raw_header: "WCW (g/L)"}
      - {raw_header: "Wet cell weight"}

  # E. coli-specific
  - name: acetate_g_l
    description: Acetate concentration. Acetate overflow is the E. coli equivalent of ethanol overflow; >5 g/L typically inhibits growth.
    data_type: float
    canonical_unit: g/L
    nominal: null
    std_dev: null
    synonyms: [acetate, acetic_acid, AcOH, acetate_conc]
    examples:
      - {raw_header: "Acetate"}
      - {raw_header: "Acetate (g/L)"}
      - {raw_header: "Acetic acid"}

  - name: iptg_mm
    description: IPTG inducer concentration. Trajectory shape pre/post induction is the E. coli protein-production diagnostic anchor.
    data_type: float
    canonical_unit: mM
    nominal: null
    std_dev: null
    synonyms: [IPTG, IPTG_conc, isopropyl_thiogalactoside]
    examples:
      - {raw_header: "IPTG"}
      - {raw_header: "IPTG (mM)"}
      - {raw_header: "IPTG conc."}

  - name: lactose_g_l
    description: Lactose inducer / carbon source. Auto-induction systems use lactose; trajectory complements IPTG diagnostics.
    data_type: float
    canonical_unit: g/L
    nominal: null
    std_dev: null
    synonyms: [lactose, Lac, lactose_conc]
    examples:
      - {raw_header: "Lactose"}
      - {raw_header: "Lactose (g/L)"}

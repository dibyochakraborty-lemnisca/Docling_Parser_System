# Identity manifest for the synthetic E. coli BL21(DE3) IPTG-induction batch fixture.
#
# Generalization regression target: covers the third Tier A organism after
# penicillin (IndPenSim) and yeast (yeast_ethanol_batch). Exercises the
# E. coli vocabulary added to golden_schema.yaml — acetate overflow as the
# diagnostic anchor, IPTG induction as a phase-change signal.

organism: Escherichia coli
product: recombinant protein
process_family: aerobic batch fermentation with IPTG induction
# No process_id — E. coli IPTG batch is not in the registered-process registry.
# The RegisteredProcess layer should populate as UNKNOWN; ObservedFacts carries
# organism/product. UNKNOWN_PROCESS flag will fire; UNKNOWN_ORGANISM should not.

scale:
  volume_l: 2.0
  vessel_type: stirred_tank_bioreactor

confidence: 1.0
rationale: >
  Synthetic E. coli BL21(DE3) IPTG-induction batch fixture for organism-coverage
  regression testing. Operator-asserted from fixture metadata, not LLM-extracted.
